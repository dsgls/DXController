name: Build

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      # Default GITHUB_TOKEN is read-only on public repos; the release
      # step needs write access to push assets + create releases.
      contents: write

    env:
      WINEDEBUG: -all
      # Suppress wine's prompt to download mono/gecko on first run — UCC
      # needs neither and the prompt would block the build.
      WINEDLLOVERRIDES: "mscoree,mshtml="
      # DeusExe-XInput release tag to bundle into the release zip.
      # Must match a published tag at
      # https://github.com/dsgls/DeusExe-XInput/releases — the workflow
      # downloads DeusExe-XInput-${DEUSEXE_XINPUT_VERSION}.zip from
      # that release.
      DEUSEXE_XINPUT_VERSION: v1.0.0

    steps:
      - name: Install wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine wine32 wine64

      - name: Initialize wine prefix
        run: |
          wineboot --init
          # Wait for wineserver to settle before the first real wine
          # invocation; otherwise the next step can race the prefix
          # creation.
          wineserver -w

      - name: Checkout DXController
        uses: actions/checkout@v6

      - name: Load buildtools deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.BUILDTOOLS_DEPLOY_KEY }}

      - name: Clone deusex-buildtools (shallow)
        run: |
          git clone --depth=1 \
            git@github.com:dsgls/deusex-buildtools.git \
            "$RUNNER_TEMP/build"

      - name: Overlay DXController, DeusEx, and DeusExe sources
        run: |
          rsync -rt DXController/ "$RUNNER_TEMP/build/DXController/"
          rsync -rt DeusEx/       "$RUNNER_TEMP/build/DeusEx/"
          rsync -rt DeusExe/      "$RUNNER_TEMP/build/DeusExe/"
          # Pre-built texture package — staged into System/ for the
          # pass-2 compile to resolve Texture'DXControllerTex.*'.
          cp DXControllerTex.u "$RUNNER_TEMP/build/System/"

      - name: Register mod packages with the compiler
        run: |
          # Insert EditPackages=DeusExe and EditPackages=DXController
          # *inside* the [Editor.EditorEngine] EditPackages block —
          # appending to EOF would land the lines under a later section
          # (e.g. [DeusEx.DeusExGameInfo]) and UCC would never see them.
          # The ini ships CRLF (buildtools' .gitattributes forces it),
          # so anchor with [[:space:]]* to absorb the trailing \r.
          #
          # DXController references Class'DeusExe.ConWindowActive2'
          # (the DeusExe-XInput launcher's runtime substitution for
          # ConWindowActive), so DeusExe must be in EditPackages *before*
          # DXController.
          INI="$RUNNER_TEMP/build/System/DeusEx.ini"
          if ! grep -qxF 'EditPackages=DeusExe' "$INI"; then
            sed -i -E '/^EditPackages=DeusEx[[:space:]]*$/a EditPackages=DeusExe' "$INI"
          fi
          if ! grep -qxF 'EditPackages=DXController' "$INI"; then
            sed -i -E '/^EditPackages=DeusExe[[:space:]]*$/a EditPackages=DXController' "$INI"
          fi
          # DXControllerTex is a pre-built texture-only package (no UScript
          # source, never rebuilt by UCC). It must be in EditPackages
          # *before* DXController so UCC can resolve Texture'DXControllerTex.*'
          # literals during the pass-2 compile.
          if ! grep -qxF 'EditPackages=DXControllerTex' "$INI"; then
            sed -i -E '/^EditPackages=DXController[[:space:]]*$/i EditPackages=DXControllerTex' "$INI"
          fi
          echo "--- EditPackages block after edit ---"
          grep -n EditPackages "$INI"

      - name: Build pass 1 — DeusEx.u
        working-directory: ${{ runner.temp }}/build/System
        run: |
          # Also delete DeusExe.u so pass 2 rebuilds it from the
          # vendored source instead of using whatever the buildtools
          # repo ships (which may not exist on a fresh clone).
          rm -f DeusEx.u DeusExe.u
          # UCC prompts to overwrite DeusEx/Inc/DeusExClasses.h; 'n'
          # lets the build proceed. UCC then GPFs while loading the
          # rebuilt package — DeusEx.u is on disk before the crash.
          # The GPF happens before UCC reaches the DeusExe / DXController
          # builds, so pass 2 is responsible for those.
          # `|| true` tolerates the GPF; the size check below is the
          # real success signal.
          echo n | wine UCC.exe make || true
          if [ ! -f DeusEx.u ]; then
            echo "::error::DeusEx.u was not produced"
            exit 1
          fi
          SIZE=$(stat -c%s DeusEx.u)
          if [ "$SIZE" -lt 1048576 ]; then
            echo "::error::DeusEx.u is $SIZE bytes (< 1 MiB) — UCC silent failure"
            exit 1
          fi
          echo "DeusEx.u OK ($SIZE bytes)"

      - name: Build pass 2 — DeusExe.u and DXController.u
        working-directory: ${{ runner.temp }}/build/System
        run: |
          rm -f DXController.u
          wine UCC.exe make
          if [ ! -f DeusExe.u ]; then
            echo "::error::DeusExe.u was not produced"
            exit 1
          fi
          if [ ! -f DXController.u ]; then
            echo "::error::DXController.u was not produced"
            exit 1
          fi
          DXSIZE=$(stat -c%s DXController.u)
          if [ "$DXSIZE" -lt 102400 ]; then
            echo "::error::DXController.u is $DXSIZE bytes (< 100 KiB) — UCC silent failure"
            exit 1
          fi
          DESIZE=$(stat -c%s DeusExe.u)
          echo "DeusExe.u OK ($DESIZE bytes); DXController.u OK ($DXSIZE bytes)"

      - name: Stage artifact files
        run: |
          cp "$RUNNER_TEMP/build/System/DeusEx.u" .
          cp "$RUNNER_TEMP/build/System/DeusExe.u" .
          cp "$RUNNER_TEMP/build/System/DXController.u" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dxcontroller-build
          path: |
            DeusEx.u
            DeusExe.u
            DXController.u
            DXControllerTex.u

      - name: Stage release contents
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REL="$RUNNER_TEMP/release/DXController-${GITHUB_REF_NAME}"
          mkdir -p "$REL"
          cp README.md "$REL/"
          cp DXControllerTex.u "$REL/"
          cp "$RUNNER_TEMP/build/System/DeusEx.u" "$REL/"
          cp "$RUNNER_TEMP/build/System/DeusExe.u" "$REL/"
          cp "$RUNNER_TEMP/build/System/DXController.u" "$REL/"

          # Bundle the matching DeusExe-XInput launcher executable.
          # DeusExe.u is built from our vendored source above; only the
          # native launcher binary comes from the upstream release zip.
          # Upstream zip extracts to DeusExe-XInput-<ver>/{deusex.exe,
          # DeusExe.u, ...}; we flatten the .exe into $REL so end users
          # get a single directory. The launcher currently ships as
          # lowercase deusex.exe — rename to DeusExe.exe on the way in
          # (case-insensitive find tolerates an upstream fix without a
          # workflow change).
          DXX_ASSET="DeusExe-XInput-${DEUSEXE_XINPUT_VERSION}.zip"
          DXX_ZIP="$RUNNER_TEMP/$DXX_ASSET"
          gh release download "$DEUSEXE_XINPUT_VERSION" \
            --repo dsgls/DeusExe-XInput \
            --pattern "$DXX_ASSET" \
            --output "$DXX_ZIP"
          DXX_DIR="$RUNNER_TEMP/deusexe-xinput"
          rm -rf "$DXX_DIR"
          mkdir -p "$DXX_DIR"
          unzip -q "$DXX_ZIP" -d "$DXX_DIR"
          EXE=$(find "$DXX_DIR" -iname 'deusex.exe' -print -quit)
          if [ -z "$EXE" ]; then
            echo "::error::$DXX_ASSET is missing deusex.exe"
            exit 1
          fi
          cp "$EXE"  "$REL/DeusExe.exe"

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{ runner.temp }}/release
        run: |
          zip -r "DXController-${GITHUB_REF_NAME}.zip" \
            "DXController-${GITHUB_REF_NAME}/"

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="$RUNNER_TEMP/release/DXController-${GITHUB_REF_NAME}.zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ZIP" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ZIP" \
              --title "DXController $GITHUB_REF_NAME" \
              --generate-notes
          fi
